
services:

  # ─── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agendamento_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-agendatech_bd}
      MYSQL_USER: ${DB_USER:-agendamento}
      MYSQL_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agendamento_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=-03:00

  # ─── API Backend ──────────────────────────────────────────────
  api:
    build: .
    container_name: agendamento_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-agendatech_bd}
      DB_USER: ${DB_USER:-agendamento}
      DB_PASS: ${DB_PASS:?Set DB_PASS in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      JOBS_ENABLED: "true"
      JOB_NOTIFICACOES_CRON: "0 * * * *"
      JOB_PONTUACAO_CRON: "*/15 * * * *"
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - ./src:/app/src
    networks:
      - agendamento_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Adminer (UI para banco — dev only, localhost-bound) ────────
  adminer:
    image: adminer:4
    container_name: agendamento_adminer
    restart: unless-stopped
    profiles:
      - dev
    depends_on:
      - mysql
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - agendamento_net
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  mysql_data:
  uploads_data:

networks:
  agendamento_net:
    driver: bridge
