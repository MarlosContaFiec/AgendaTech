version: "3.9"

services:

  db:
    image: mariadb:10.6
    container_name: agendatech_db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agendatech

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./banco/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    container_name: agendatech_app

    ports:
      - "8000:8000"

    volumes:
      - ./app:/var/www/html

    depends_on:
      - db

volumes:
  db_data:
